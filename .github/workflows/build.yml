name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x'

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet Packages
      run: dotnet restore src/EnemyHPBarUpdated.csproj

    - name: Build
      run: msbuild src/EnemyHPBarUpdated.csproj /p:Configuration=Release /p:SolutionDir=${{ github.workspace }} /p:HKRefs=${{ github.workspace }}/Libs /p:HKModdingApi=${{ github.workspace }}/Libs /p:HKModRefs=${{ github.workspace }}/Libs

    - name: Prepare Release
      shell: pwsh
      run: |
        mkdir dist_output
        copy src/bin/Release/EnemyHPBarUpdated.dll dist_output/
        copy README.md dist_output/
        copy LICENSE dist_output/
        Compress-Archive -Path dist_output/* -DestinationPath EnemyHPBarUpdated.zip

    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: EnemyHPBarUpdated.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
